<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AFURI - Quiz</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <div class="phone-frame">


    <!-- Header -->
    <div class="header">
      <button class="menu-btn" aria-label="メニュー">
        <svg width="24" height="18" viewBox="0 0 24 18" fill="none">
          <rect y="0" width="24" height="2.5" rx="1.25" fill="#222" />
          <rect y="7.5" width="24" height="2.5" rx="1.25" fill="#222" />
          <rect y="15" width="24" height="2.5" rx="1.25" fill="#222" />
        </svg>
      </button>
      <div class="header-title-group">
        <div class="header-title-row">
          <span class="header-title">AFURI</span>
          <svg class="dropdown-arrow" width="10" height="6" viewBox="0 0 10 6" fill="none">
            <path d="M1 1l4 4 4-4" stroke="#222" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" />
          </svg>
        </div>
        <span class="header-subtitle">阿夫利</span>
      </div>
    </div>

    <!-- Map Area -->
    <div class="map-area" id="mapArea">
      <!-- Timer badge -->
      <div class="timer-badge">10min...</div>

      <!-- SVG shapes will be placed here by JavaScript -->
    </div>

    <!-- Quiz Section -->
    <div class="quiz-section">
      <img class="quiz-frame-bg" src="quiz-frame.svg" alt="" />
      <div class="quiz-content">
        <div class="quiz-tab-label">quiz</div>
        <p class="quiz-question">Qお店の発祥は？</p>
        <div class="quiz-progress">
          <div class="quiz-progress-bar" id="quizProgressBar"></div>
        </div>
        <div class="quiz-options">
          <button class="quiz-option">A.東京</button>
          <button class="quiz-option">B.北海道</button>
        </div>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>

</html>
